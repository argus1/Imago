name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy src
      - name: Unit tests
        run: pytest tests/unit
      - name: Integration tests
        run: pytest tests/integration
      - name: System tests
        run: pytest tests/system

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies and security tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install pip-audit bandit[toml] detect-secrets

      - name: Dependency vulnerability scan
        run: pip-audit --progress-spinner off

      - name: Secret scan
        run: |
          git ls-files -z | xargs -0 detect-secrets scan --exclude-files ".*\.example$" > .secrets.baseline
          python - <<'PY'
          import json
          import sys

          with open('.secrets.baseline', encoding='utf-8') as f:
              data = json.load(f)

          results = data.get('results', {})
          if results:
              print('Secrets detected in tracked files:')
              for file_name, findings in results.items():
                  print(f'- {file_name}: {len(findings)} finding(s)')
              sys.exit(1)

          print('No secrets detected in tracked files.')
          PY

      - name: SAST scan (Bandit)
        id: bandit
        shell: bash
        run: |
          set +e
          bandit -r src -f json -o bandit.json
          bandit_exit_code=$?

          if [[ -f bandit.json ]]; then
            python - <<'PY'
            import json
            from pathlib import Path

            source = Path("bandit.json")
            data = json.loads(source.read_text(encoding="utf-8"))

            severity_map = {
                "LOW": "note",
                "MEDIUM": "warning",
                "HIGH": "error",
            }

            rules: dict[str, dict[str, object]] = {}
            results: list[dict[str, object]] = []

            for finding in data.get("results", []):
                rule_id = finding["test_id"]
                rules.setdefault(
                    rule_id,
                    {
                        "id": rule_id,
                        "name": finding.get("test_name", rule_id),
                        "shortDescription": {
                            "text": finding.get("issue_text", rule_id),
                        },
                        "help": {
                            "text": finding.get("more_info", "Bandit finding"),
                        },
                        "properties": {
                            "tags": [
                                f"severity:{finding.get('issue_severity', 'LOW').lower()}",
                                f"confidence:{finding.get('issue_confidence', 'LOW').lower()}",
                            ],
                        },
                    },
                )

                results.append(
                    {
                        "ruleId": rule_id,
                        "level": severity_map.get(
                            finding.get("issue_severity", "LOW"),
                            "warning",
                        ),
                        "message": {
                            "text": finding.get("issue_text", rule_id),
                        },
                        "locations": [
                            {
                                "physicalLocation": {
                                    "artifactLocation": {
                                        "uri": finding["filename"],
                                    },
                                    "region": {
                                        "startLine": finding.get("line_number", 1),
                                    },
                                },
                            },
                        ],
                    },
                )

            sarif = {
                "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
                "version": "2.1.0",
                "runs": [
                    {
                        "tool": {
                            "driver": {
                                "name": "Bandit",
                                "informationUri": "https://bandit.readthedocs.io/",
                                "rules": list(rules.values()),
                            },
                        },
                        "results": results,
                    },
                ],
            }

            Path("bandit.sarif").write_text(
                json.dumps(sarif, indent=2),
                encoding="utf-8",
            )
            PY
          fi

          echo "bandit_exit_code=${bandit_exit_code}" >> "$GITHUB_OUTPUT"

      - name: Upload SAST SARIF
        if: always() && hashFiles('bandit.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit.sarif

      - name: Fail if Bandit reported findings
        if: steps.bandit.outputs.bandit_exit_code != '0'
        run: |
          echo "Bandit reported findings or encountered an execution error."
          exit 1
